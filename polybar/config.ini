[colors]
background = #000000
foreground = #FFFFFF
alert = #A54242
disabled = #707880

[bar/mybar]
width = 100%
height = 24pt
radius = 0
enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0

padding-left = 0
padding-right = 1
module-margin = 1

separator = 
separator-foreground = ${colors.disabled}

# --- FONTS ---
# Use JetBrains Mono Nerd Font for EVERYTHING.
# The ";2" shifts the text vertically to center it.
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=11;2"
# Fallback for specific symbols if needed
font-1 = "JetBrainsMono Nerd Font:style=Bold:size=11;2"

modules-left = i3 date
modules-center = 
modules-right = myvol bandwidth cpu battery

cursor-click = pointer
cursor-scroll = ns-resize
tray-position = right
tray-background = ${colors.background}

# --- MODULES ---

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
label-focused = %index%
label-focused-foreground = #FFFFFF
label-focused-background = #333333
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = #888888
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/date]
type = internal/date
interval = 1
date = %d/%m/%y %H:%M:%S
label = %date%
label-foreground = #FFFFFF

[module/myvol]
type = custom/script
exec = ~/.config/polybar/scripts/volume_event
tail = true

[module/bandwidth]
type = custom/script
exec = ~/.config/polybar/scripts/fast_bandwidth
tail = true
label = %output%
label-foreground = #FFFFFF
# Min-width to prevent jitter
label-minlen = 24
label-alignment = right

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/fast_cpu_usage
tail = true
label = %output%
label-foreground = #FFFFFF
# Min-width to prevent jitter
label-minlen = 5
label-alignment = right

[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery
tail = true
label = %output%
label-foreground = #FFFFFF

[settings]
screenchange-reload = true
