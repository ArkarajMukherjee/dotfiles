[colors]
# 00 at the start makes the background fully transparent
background = #88000000
foreground = #FFFFFF
alert = #A54242
disabled = #707880

# Your Vim Accent Colors
vim-green = #98c379
vim-grey = #777777

[bar/mybar]
width = 100%
height = 24pt
radius = 0
enable-ipc = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 0

padding-left = 0
padding-right = 1
module-margin = 1

separator = " "
separator-foreground = ${colors.disabled}

# --- FONTS ---
# 1. Primary Font + Icons
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=11;2"
# 2. CJK Fallback (Catches Japanese, Simplified Chinese, Traditional Chinese, and Korean)
font-1 = "Noto Sans CJK JP:style=Regular:size=11;2"
# 3. Emoji support
font-2 = "Noto Color Emoji:scale=10;2"

modules-left = i3 date
modules-center = music
modules-right = myvol bandwidth cpu battery

cursor-click = pointer
cursor-scroll = ns-resize
tray-position = right
tray-background = ${colors.background}

[settings]
screenchange-reload = true

# =======================================
#               MODULES
# =======================================

[module/i3]
type = internal/i3
format = <label-state> <label-mode>

label-focused = "%index%"
label-focused-foreground = ${colors.vim-green}
label-focused-padding = 1

label-unfocused = "%index%"
label-unfocused-foreground = ${colors.disabled}
label-unfocused-padding = 1

label-urgent = "%index%"
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1


[module/date]
type = internal/date
interval = 1
date = %d/%m/%y %H:%M:%S

label = %date%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}


[module/music]
type = custom/script
exec = ~/.config/polybar/scripts/music_caraousel.sh
tail = true

label = %output%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}


[module/myvol]
type = custom/script
exec = ~/.config/polybar/scripts/volume_event
tail = true

label = %output%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}


[module/bandwidth]
type = custom/script
exec = ~/.config/polybar/scripts/fast_bandwidth
tail = true
label-minlen = 24
label-alignment = right

label = %output%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}


[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/fast_cpu_usage
tail = true
label-minlen = 5
label-alignment = right

label = %output%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}


[module/battery]
type = custom/script
exec = ~/.config/polybar/scripts/battery
tail = true

label = %output%
label-foreground = ${colors.vim-green}
format-prefix = "[ "
format-prefix-foreground = ${colors.vim-grey}
format-suffix = " ]"
format-suffix-foreground = ${colors.vim-grey}
